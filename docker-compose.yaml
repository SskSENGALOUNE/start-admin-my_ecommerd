version: '3.8'

services:
  db:
    container_name: postgres_db
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Root1234
      POSTGRES_DB: starter-admin

    ports:
      - "5434:5432"
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend
  redis:
    container_name: redis_cache
    image: redis:7.4.1-alpine3.20
    ports:
      - "6379:6379"
    restart: always
    networks:
      - backend
    volumes:
      - redis_data:/data
    
volumes:
  db_data:
  redis_data:

networks:
  backend:
    driver: bridge
